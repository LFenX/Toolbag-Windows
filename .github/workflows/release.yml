name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-windows:
    name: Build Windows Release
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup pnpm
        shell: pwsh
        run: |
          corepack enable
          corepack prepare pnpm@11.0.9 --activate

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Verify frontend
        run: pnpm check

      - name: Verify Rust
        working-directory: src-tauri
        run: |
          cargo fmt --check
          cargo test
          cargo clippy --all-targets -- -D warnings

      - name: Prepare updater config
        env:
          TAURI_UPDATER_PUBKEY: ${{ secrets.TAURI_UPDATER_PUBKEY }}
          TOOLBAG_UPDATER_ENDPOINT: ${{ vars.TOOLBAG_UPDATER_ENDPOINT }}
        run: pnpm prepare:tauri-release

      - name: Verify plugin signing key
        shell: pwsh
        env:
          TOOLBAG_PLUGIN_PUBKEY: ${{ secrets.TOOLBAG_PLUGIN_PUBKEY }}
        run: |
          if ([string]::IsNullOrWhiteSpace($env:TOOLBAG_PLUGIN_PUBKEY)) {
            throw "TOOLBAG_PLUGIN_PUBKEY secret is required so release builds enforce plugin signatures."
          }

      - name: Build and publish Tauri release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          TOOLBAG_PLUGIN_PUBKEY: ${{ secrets.TOOLBAG_PLUGIN_PUBKEY }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "Toolbag ${{ github.ref_name }}"
          releaseDraft: true
          prerelease: false
          args: --features updater --config src-tauri/tauri.release.conf.json
